<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Harper's STEM" />
  <meta name="theme-color" content="#f63497" />
  <title>Harper's STEM Learning</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="splash" class="splash" aria-label="Loading screen">
    <section class="image-stage splash-stage">
      <img src="assets/splash.png" alt="Harper's STEM Learning princess splash screen" draggable="false" />
      <div class="dad-badge">Built by Dad for his little princess</div>
      <div class="version-badge">v0.9.6</div>
    </section>
  </div>

  <div id="portraitLock" class="portrait-lock">
    <div class="turn-card">
      <div class="turn-icon">📱↔️</div>
      <h2>Turn iPad Sideways</h2>
      <p>Harper's STEM Learning plays in landscape.</p>
    </div>
  </div>

  <main class="app-shell" id="appShell">
    <section class="image-stage game-stage" aria-label="Harper's STEM Learning game dashboard">
      <img src="assets/dashboard.png" alt="Princess castle STEM dashboard" draggable="false" />

      <button class="hotspot menu" data-nav="menu" aria-label="Menu"></button>
      <button class="hotspot card math" data-subject="Math" aria-label="Play Math"></button>
      <button class="hotspot card reading" data-subject="Reading" aria-label="Play Reading"></button>
      <button class="hotspot card science" data-subject="Science" aria-label="Play Science"></button>
      <button class="hotspot card coding" data-subject="Coding" aria-label="Play Coding"></button>
      <button class="hotspot card speech" data-subject="Speech" aria-label="Play Speech"></button>

      <button class="hotspot nav home active" data-nav="Home" aria-label="Home"></button>
      <button class="hotspot nav map" data-nav="Map" aria-label="Map"></button>
      <button class="hotspot nav princess" data-nav="Princess" aria-label="Princess"></button>
      <button class="hotspot nav pets" data-nav="Pets" aria-label="Pets"></button>
      <button class="hotspot nav treasures" data-nav="Treasures" aria-label="Treasures"></button>
      <button class="hotspot nav calendar" data-nav="Calendar" aria-label="Calendar"></button>
      <button class="hotspot nav parents" data-nav="Parents" aria-label="Parents"></button>
      <button class="hotspot adventure" data-subject="Coding Adventure" aria-label="New coding adventure"></button>
      <button class="hotspot achievements" data-nav="Achievements" aria-label="Achievements"></button>

      <div class="live-stars" id="starCount" aria-live="polite">248</div>
      <div class="live-goal" id="goalCount">8 / 20</div>
      <div class="subject-stars math-stars" id="mathStars">78 / 100</div>
      <div class="subject-stars reading-stars" id="readingStars">45 / 100</div>
      <div class="subject-stars science-stars" id="scienceStars">38 / 100</div>
      <div class="subject-stars coding-stars" id="codingStars">52 / 100</div>
      <div class="subject-stars speech-stars" id="speechStars">35 / 100</div>
      <div class="live-version">v0.9.6</div>
    </section>
  </main>

  <dialog id="gameModal" class="game-modal">
    <form method="dialog" class="modal-card">
      <button class="close" value="close" aria-label="Close">×</button>
      <div class="modal-icon" id="modalIcon">⭐</div>
      <h2 id="modalTitle">Play</h2>
      <p id="modalPrompt">Tap the right answer to earn stars.</p>
      <div id="choices" class="choices"></div>
      <p id="result" class="result"></p>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
